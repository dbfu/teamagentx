name: mobile_flutter
description: "TeamAgentX Flutter Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.2

  # 路由
  go_router: ^15.1.2

  # 网络请求
  http: ^1.3.0
  dio: ^5.8.0

  # WebSocket
  socket_io_client: ^3.1.2

  # 本地存储
  shared_preferences: ^2.5.3

  # 图片选择
  image_picker: ^1.1.2

  # WebView
  webview_flutter: ^4.13.0

  # UUID
  uuid: ^4.5.1

  # 时间格式化
  intl: ^0.20.2

  # 图片缓存
  cached_network_image: ^3.4.1

  # 二维码扫描
  mobile_scanner: ^7.0.1

  # 权限管理
  permission_handler: ^11.4.0

  # 打开外部链接
  url_launcher: ^6.3.2

  # 加载动画
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
