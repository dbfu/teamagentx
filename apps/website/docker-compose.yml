services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # ── 版本更新时修改这三个参数 ──
        VITE_APP_VERSION: "v1.2.0"
        VITE_DOWNLOAD_URL_MAC: "https://releases.teamagentx.com/1.2.0/TeamAgentX-1.2.0-mac.dmg"
        VITE_DOWNLOAD_URL_WIN: "https://releases.teamagentx.com/1.2.0/TeamAgentX-1.2.0-win.exe"
    image: teamagentx/website:latest
    container_name: teamagentx-website
    ports:
      - "3000:80"
    restart: unless-stopped
